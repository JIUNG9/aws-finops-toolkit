<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — FinOps Platform</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4" defer></script>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">FinOps</h1>
                <span class="version">v0.2.0</span>
            </div>
            <ul class="nav-links">
                <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
                <li><a href="/scans" class="{% if '/scans' in request.url.path %}active{% endif %}">Scans</a></li>
                <li><a href="/findings" class="{% if '/findings' in request.url.path %}active{% endif %}">Findings</a></li>
                <li><a href="/recommendations" class="{% if '/recommendations' in request.url.path %}active{% endif %}">AI Recommendations</a></li>
                <li class="nav-section">SRE</li>
                <li><a href="/error-budgets" class="{% if '/error-budgets' in request.url.path %}active{% endif %}">Error Budgets</a></li>
                <li><a href="/services" class="{% if '/services' in request.url.path %}active{% endif %}">Services</a></li>
                <li><a href="/incidents" class="{% if '/incidents' in request.url.path %}active{% endif %}">Incidents</a></li>
                <li class="nav-section">FinOps</li>
                <li><a href="/budgets" class="{% if '/budgets' in request.url.path %}active{% endif %}">Budgets</a></li>
                <li><a href="/costs" class="{% if '/costs' in request.url.path %}active{% endif %}">Cost Tracking</a></li>
                <li class="nav-section">Settings</li>
                <li><a href="/settings" class="{% if '/settings' in request.url.path %}active{% endif %}">Settings</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="https://github.com/junegu/aws-finops-toolkit" target="_blank">GitHub</a>
                <a href="/api/v1/health">API</a>
            </div>
        </nav>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
